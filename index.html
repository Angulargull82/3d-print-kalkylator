<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>3D-print Kalkylator — förenklad</title>
<style>
  :root{--bg:#f6f7fb;--card:#ffffff;--accent:#0b5ed7;--muted:#666;}
  body{font-family:Inter,system-ui,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);margin:0;padding:24px;display:flex;align-items:flex-start;justify-content:center;min-height:100vh}
  .card{width:100%;max-width:880px;background:var(--card);border-radius:12px;box-shadow:0 6px 24px rgba(12,20,40,.08);padding:20px}
  h1{margin:0 0 12px;font-size:20px}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
  select,input[type=number]{width:100%;padding:8px 10px;border:1px solid #e6e9ef;border-radius:8px;font-size:15px}
  .full{grid-column:1/-1}
  .actions{display:flex;gap:10px;margin-top:14px}
  button{background:var(--accent);color:#fff;padding:10px 14px;border:0;border-radius:8px;cursor:pointer}
  button.ghost{background:#eef3ff;color:var(--accent);border:1px solid #d9e6ff}
  .results{margin-top:18px;padding:14px;border-radius:8px;background:#fbfdff;border:1px solid #eef4ff}
  .row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f1f4fb}
  .row:last-child{border-bottom:0}
  .muted{color:var(--muted);font-size:13px}
  .small{font-size:12px;color:var(--muted)}
  .hidden{display:none}
  @media(max-width:700px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
  <main class="card" role="main">
    <h1>3D-print Pris-kalkylator — förenklad</h1>

    <div class="grid">
      <div>
        <label>Material (snabbval)</label>
        <select id="materialSelect">
          <option value="PLA">PLA</option>
          <option value="PETG">PETG</option>
          <option value="ABS">ABS</option>
          <option value="TPU">TPU</option>
          <option value="Custom">Eget (custom)</option>
        </select>
      </div>

      <div>
        <label>Vikt (vanliga val)</label>
        <select id="weightSelect">
          <option value="10">~10 g</option>
          <option value="25">~25 g</option>
          <option value="50" selected>~50 g</option>
          <option value="100">~100 g</option>
          <option value="250">~250 g</option>
          <option value="custom">Ange exakt</option>
        </select>
        <input id="weightCustom" class="hidden" type="number" min="0.1" step="0.1" placeholder="Vikt i gram (ex 47.5)">
      </div>

      <div>
        <label>Printtid (vanliga val)</label>
        <select id="timeSelect">
          <option value="0.5">~0.5 h</option>
          <option value="1">~1 h</option>
          <option value="2">~2 h</option>
          <option value="3" selected>~3 h</option>
          <option value="5">~5 h</option>
          <option value="custom">Ange exakt</option>
        </select>
        <input id="timeCustom" class="hidden" type="number" min="0.01" step="0.01" placeholder="Tid i timmar (ex 2.25)">
      </div>

      <div>
        <label>Kvalitet (påverkar printtid)</label>
        <select id="qualitySelect">
          <option value="draft">Draft — snabb, tunnare vägg</option>
          <option value="standard" selected>Standard — bra balans</option>
          <option value="strong">Strong — mer solid, längre tid</option>
        </select>
      </div>

      <div>
        <label>Finish / efterarbete</label>
        <select id="finishSelect">
          <option value="none" selected>Inget</option>
          <option value="light">Lätt slipning/supportborttag — ~10 min</option>
          <option value="sand">Noggrann slipning/support — ~20 min</option>
          <option value="paint">Målning/finish — ~60 min</option>
        </select>
      </div>

      <div>
        <label>Include fail-cost?</label>
        <select id="failSelect">
          <option value="0">Nej (jag står för fails)</option>
          <option value="0.05">Liten (5%)</option>
          <option value="0.10">Måttlig (10%)</option>
          <option value="0.20">Stor (20%)</option>
        </select>
      </div>

      <div>
        <label>Energi / elpris (snabbval)</label>
        <select id="elSelect">
          <option value="low">Lågt (1.00 SEK/kWh)</option>
          <option value="medium" selected>Standard (1.50 SEK/kWh)</option>
          <option value="high">Högt (2.50 SEK/kWh)</option>
          <option value="custom">Ange eget</option>
        </select>
        <input id="elCustom" class="hidden" type="number" min="0.01" step="0.01" placeholder="SEK per kWh">
      </div>

      <div>
        <label>Maskinprofil (snabbval för effekt & driftkostnad)</label>
        <select id="machineProfile">
          <option value="kobra">Anycubic Kobra S1 Combo — standard</option>
          <option value="small">Liten printer — låg effekt</option>
          <option value="pro">Pro / större maskin — högre effekt</option>
          <option value="custom">Custom</option>
        </select>
      </div>

      <div class="full">
        <label class="muted">Tryck på "Beräkna pris". Vill du ändra prisnivåer (filament, el, maskin, efterarbete) öppna koden och leta efter kommentaren "ÄNDRA HÄR" i skriptet — där ändrar du snabbt siffrorna.</label>
      </div>
    </div>

    <div class="actions">
      <button id="calcBtn">Beräkna pris</button>
      <button id="resetBtn" class="ghost" type="button">Återställ</button>
      <button id="copyBtn" class="ghost" type="button">Kopiera resultat</button>
    </div>

    <section class="results" id="results" aria-live="polite">
      <div class="row"><div class="muted">Materialkostnad</div><div id="materialCost">—</div></div>
      <div class="row"><div class="muted">Energikostnad</div><div id="energyCost">—</div></div>
      <div class="row"><div class="muted">Maskinkostnad (drift)</div><div id="machineCost">—</div></div>
      <div class="row"><div class="muted">Efterarbete (per del)</div><div id="finishCost">—</div></div>
      <div class="row"><div class="muted">Misslyckandekost (waste)</div><div id="failCost">—</div></div>
      <div class="row"><strong>Summa (utan vinst)</strong><strong id="sumNoProfit">—</strong></div>
      <div class="row"><div class="muted">Efter vinstmarginal (fritt i koden)</div><div id="afterProfit">—</div></div>
      <div class="row"><div class="muted">Slutpris (inkl. moms)</div><div id="finalPrice">—</div></div>
    </section>
  </main>

<script>
/*
  ======= ÄNDRA HÄR för att justera priser/presets =======
  - FILAMENT_PRICES: pris i SEK per kg för varje material.
  - EL_VALUES: SEK/kWh för presets low/medium/high.
  - MACHINE_PROFILES: anger [effect_W, driftCost_perHour_SEK, machinePrice_SEK, lifetime_hours]
    - driftCost_perHour är dina löpande driftkostnader per timme (värde som tidigare machineHour).
    - machinePrice och lifetime används för att räkna underhåll/avskrivning per timme.
  - DEFAULT_MARGIN: vinstmarginal som appliceras (0.4 = 40%)
  - VAT: moms (0.25 = 25%)
  Ändra bara siffrorna nedan — låt resten av koden vara som den är.
*/
const FILAMENT_PRICES = { PLA: 200, PETG: 220, ABS: 180, TPU: 350, Custom: 200 };
const EL_VALUES = { low:1.00, medium:1.50, high:2.50 };
const MACHINE_PROFILES = {
  kobra: { power:250, drift:2.46, price:7000, lifetime:10000 },
  small: { power:150, drift:1.50, price:3000, lifetime:8000 },
  pro:   { power:400, drift:5.00, price:15000, lifetime:15000 },
  custom:{ power:250, drift:2.46, price:7000, lifetime:10000 }
};
const DEFAULT_MARGIN = 0.40; // 40% vinst som standard
const VAT = 0.25; // 25% moms
/* ===================================================== */

function fmt(v){ return (Math.round(v*100)/100).toLocaleString('sv-SE',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' kr'; }

// UI toggles for custom inputs
const weightSelect = document.getElementById('weightSelect');
const weightCustom = document.getElementById('weightCustom');
const timeSelect = document.getElementById('timeSelect');
const timeCustom = document.getElementById('timeCustom');
const elSelect = document.getElementById('elSelect');
const elCustom = document.getElementById('elCustom');
const materialSelect = document.getElementById('materialSelect');

weightSelect.addEventListener('change', ()=> {
  weightCustom.classList.toggle('hidden', weightSelect.value !== 'custom');
});
timeSelect.addEventListener('change', ()=> {
  timeCustom.classList.toggle('hidden', timeSelect.value !== 'custom');
});
elSelect.addEventListener('change', ()=> {
  elCustom.classList.toggle('hidden', elSelect.value !== 'custom');
});
materialSelect.addEventListener('change', ()=>{
  // if Custom material chosen we leave FILAMENT_PRICES.Custom as default and allow code edit
  // no UI custom input for filament price (you edit in code)
});

function calculate(){
  // -> Vikt
  const weight = (weightSelect.value === 'custom') ? parseFloat(weightCustom.value)||0 : parseFloat(weightSelect.value);
  // -> Tid i timmar
  const time = (timeSelect.value === 'custom') ? parseFloat(timeCustom.value)||0 : parseFloat(timeSelect.value);

  // Kvalitetsmultiplikator (påverkar tid)
  const quality = document.getElementById('qualitySelect').value;
  const qualityMultiplier = quality === 'draft' ? 0.7 : (quality === 'standard' ? 1 : 1.5);

  // Finish -> minuter
  const finish = document.getElementById('finishSelect').value;
  const finishMinutesMap = { none:0, light:10, sand:20, paint:60 };
  const finishMinutes = finishMinutesMap[finish] || 0;

  // Fail-rate
  const failRate = parseFloat(document.getElementById('failSelect').value)||0;

  // Materialpris från preset (i SEK/kg)
  const materialKey = document.getElementById('materialSelect').value;
  const filamentPricePerKg = FILAMENT_PRICES[materialKey] ?? FILAMENT_PRICES.Custom;

  // Elpris
  const elPreset = document.getElementById('elSelect').value;
  const elPrice = elPreset === 'custom' ? (parseFloat(elCustom.value)||EL_VALUES.medium) : (EL_VALUES[elPreset] || EL_VALUES.medium);

  // Maskinprofil
  const profileKey = document.getElementById('machineProfile').value;
  const profile = MACHINE_PROFILES[profileKey] || MACHINE_PROFILES.custom;

  // Beräkningar
  const materialCost = (weight/1000) * filamentPricePerKg;
  const effectiveTime = Math.max(0.01, time * qualityMultiplier); // timmar
  const energyCost = (profile.power/1000) * effectiveTime * elPrice;
  const machineCost = profile.drift * effectiveTime;
  const maintPerHour = profile.price / profile.lifetime;
  const maintTotal = maintPerHour * effectiveTime;
  const finishCost = (finishMinutes/60) * (200); // default finish-timpris hårdkodat 200 SEK/h; ändra i kommentaren om du vill
  const baseForFail = materialCost + energyCost;
  const failCost = failRate * baseForFail;

  const sumNoProfit = materialCost + energyCost + machineCost + maintTotal + finishCost + failCost;
  const afterProfit = sumNoProfit * (1 + DEFAULT_MARGIN);
  const finalPrice = afterProfit * (1 + VAT);

  // UI update
  document.getElementById('materialCost').innerText = fmt(materialCost);
  document.getElementById('energyCost').innerText = fmt(energyCost);
  document.getElementById('machineCost').innerText = fmt(machineCost);
  document.getElementById('finishCost').innerText = fmt(finishCost);
  document.getElementById('failCost').innerText = fmt(failCost);
  document.getElementById('sumNoProfit').innerText = fmt(sumNoProfit);
  document.getElementById('afterProfit').innerText = fmt(afterProfit);
  document.getElementById('finalPrice').innerText = fmt(finalPrice);

  return { materialCost, energyCost, machineCost, maintTotal, finishCost, failCost, sumNoProfit, afterProfit, finalPrice };
}

// Buttons
document.getElementById('calcBtn').addEventListener('click', calculate);
document.getElementById('resetBtn').addEventListener('click', ()=>{
  document.getElementById('materialSelect').value = 'PLA';
  document.getElementById('weightSelect').value = '50'; weightCustom.classList.add('hidden'); weightCustom.value = '';
  document.getElementById('timeSelect').value = '3'; timeCustom.classList.add('hidden'); timeCustom.value = '';
  document.getElementById('qualitySelect').value = 'standard';
  document.getElementById('finishSelect').value = 'none';
  document.getElementById('failSelect').value = '0';
  document.getElementById('elSelect').value = 'medium'; elCustom.classList.add('hidden'); elCustom.value = '';
  document.getElementById('machineProfile').value = 'kobra';
  calculate();
});
document.getElementById('copyBtn').addEventListener('click', ()=>{
  const r = calculate();
  const text = `Pris: ${(Math.round(r.finalPrice*100)/100).toLocaleString('sv-SE')} SEK (inkl. moms)\nDetaljer:\nMaterial: ${r.materialCost.toFixed(2)} SEK\nEnergi: ${r.energyCost.toFixed(2)} SEK\nMaskin drift: ${r.machineCost.toFixed(2)} SEK\nEfterarbete: ${r.finishCost.toFixed(2)} SEK\nWaste: ${r.failCost.toFixed(2)} SEK\nSumma utan vinst: ${r.sumNoProfit.toFixed(2)} SEK\nEfter vinst: ${r.afterProfit.toFixed(2)} SEK`;
  navigator.clipboard?.writeText(text);
  alert('Resultat kopierat till urklipp.');
});

// första run
calculate();
</script>
</body>
</html>
